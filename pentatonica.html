<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentatónicas — Music Theory Tools</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;min-height:100vh;font-family:sans-serif;color:#ddd}
.header{padding:.9rem 1.5rem;display:flex;align-items:center;gap:14px;border-bottom:1px solid #1e1e1e}
.back{color:#555;text-decoration:none;font-size:13px}.back:hover{color:#aaa}
.page-title{color:#ddd;font-size:15px;font-weight:600}
.container{max-width:960px;margin:0 auto;padding:1.5rem;display:flex;flex-direction:column;gap:2rem}
.tool-section{background:#1a1a1a;border-radius:12px;padding:1rem}
.tool-header{font-size:14px;font-weight:700;margin-bottom:1rem;padding-bottom:.6rem;border-bottom:1px solid #252525}
.pw{font-family:sans-serif}
.prow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:.9rem}
.pb{font-size:13px;padding:5px 12px;border:1px solid #444;border-radius:8px;background:transparent;color:#ccc;cursor:pointer}
.pb:hover{border-color:#888;color:#fff}
.psec{font-size:11px;color:#555;letter-spacing:.08em;margin-bottom:6px}
.pleg{display:flex;flex-wrap:wrap;gap:18px;margin-top:12px;font-size:13px;color:#aaa;align-items:center}
.pinfo{font-size:12px;color:#666;margin-top:8px}
</style>
</head>
<body>
<div class="header">
  <a class="back" href="index.html">← Herramientas</a>
  <span class="page-title">Escalas Pentatónicas</span>
</div>
<div class="container">

<!-- MINOR PENTATONIC -->
<div class="tool-section">
  <div class="tool-header" style="color:#4a9eff">Pentatónica Menor</div>
  <div class="pw" id="minor-root"></div>
  <div class="pw" id="minor-tune"></div>
  <div class="pw" id="minor-pos"></div>
  <div id="minor-fb" style="overflow-x:auto;margin-top:4px"></div>
  <div class="pleg">
    <span style="display:flex;align-items:center;gap:6px"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#4a9eff"/></svg>Tónica (R)</span>
    <span style="display:flex;align-items:center;gap:6px"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#555"/></svg>Escala</span>
  </div>
  <div class="pinfo" id="minor-info"></div>
</div>

<!-- MAJOR PENTATONIC -->
<div class="tool-section">
  <div class="tool-header" style="color:#4caf50">Pentatónica Mayor</div>
  <div class="pw" id="major-root"></div>
  <div class="pw" id="major-tune"></div>
  <div class="pw" id="major-pos"></div>
  <div id="major-fb" style="overflow-x:auto;margin-top:4px"></div>
  <div class="pleg">
    <span style="display:flex;align-items:center;gap:6px"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#4caf50"/></svg>Tónica (R)</span>
    <span style="display:flex;align-items:center;gap:6px"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#555"/></svg>Escala</span>
  </div>
  <div class="pinfo" id="major-info"></div>
</div>

</div>
<script>
const rootNames=['C','C#','D','Eb','E','F','F#','G','Ab','A','Bb','B'];
const rootSemi={C:0,'C#':1,D:2,Eb:3,E:4,F:5,'F#':6,G:7,Ab:8,A:9,Bb:10,B:11};
const NOTES_F=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

const TUNINGS=[
  {name:'Standard',s:[4,9,2,7,11,4]},{name:'Eb',s:[3,8,1,6,10,3]},
  {name:'D',s:[2,7,0,5,9,2]},{name:'Drop D',s:[2,9,2,7,11,4]},
  {name:'Drop C',s:[0,7,0,5,9,2]},{name:'Drop B',s:[11,6,11,4,8,1]},
  {name:'Open G',s:[2,7,2,7,11,2]},{name:'Open D',s:[2,9,2,6,9,2]},
  {name:'Open E',s:[4,11,4,8,11,4]},{name:'DADGAD',s:[2,9,2,7,9,2]},
];

const MINOR_POS=[
  {l:'1',frets:{6:[5,8],5:[5,7],4:[5,7],3:[5,7],2:[5,8],1:[5,8]},info:'Raíz en cuerdas 6, 4 y 1. La posición más común para solos.'},
  {l:'2',frets:{6:[8,10],5:[7,10],4:[7,10],3:[7,9],2:[8,10],1:[8,10]},info:'Raíz en cuerdas 4 y 2. Conecta la pos. 1 hacia el agudo.'},
  {l:'3',frets:{6:[10,12],5:[10,12],4:[10,12],3:[9,12],2:[10,13],1:[10,12]},info:'Raíz en cuerdas 5 y 2. Zona media del mástil.'},
  {l:'4',frets:{6:[12,15],5:[12,15],4:[12,14],3:[12,14],2:[13,15],1:[12,15]},info:'Raíz en cuerdas 5 y 3. Espejo de la pos. 2.'},
  {l:'5',frets:{6:[3,5],5:[3,5],4:[2,5],3:[2,5],2:[3,5],1:[3,5]},info:'Raíz en cuerdas 6, 3 y 1. Cierra el ciclo debajo de la pos. 1.'},
];
const MINOR_DEG={0:'R',3:'b3',5:'4',7:'5',10:'b7'};

const MAJOR_POS=[
  {l:'1',frets:{6:[5,7],5:[4,7],4:[4,7],3:[4,6],2:[5,7],1:[5,7]},info:'Raíz en cuerdas 6, 4 y 1. Posición de referencia.'},
  {l:'2',frets:{6:[7,9],5:[7,9],4:[7,9],3:[6,9],2:[7,10],1:[7,9]},info:'Raíz en cuerdas 4 y 2. Conecta pos. 1 hacia el agudo.'},
  {l:'3',frets:{6:[9,12],5:[9,12],4:[9,11],3:[9,11],2:[10,12],1:[9,12]},info:'Raíz en cuerdas 5 y 2. Zona media del mástil.'},
  {l:'4',frets:{6:[12,14],5:[12,14],4:[11,14],3:[11,14],2:[12,14],1:[12,14]},info:'Raíz en cuerdas 5 y 3. Espejo de la pos. 2.'},
  {l:'5',frets:{6:[2,5],5:[2,4],4:[2,4],3:[2,4],2:[2,5],1:[2,5]},info:'Raíz en cuerdas 6, 3 y 1. Cierra el ciclo debajo de la pos. 1.'},
];
const MAJOR_DEG={0:'R',2:'M2',4:'M3',7:'5',9:'M6'};

// State
const state={
  minor:{root:'A',tune:0,pos:0},
  major:{root:'A',tune:0,pos:0},
};

function transposePos(pos,shift,toneKey){
  const frets={};
  for(let s=1;s<=6;s++) frets[s]=pos.frets[s].map(f=>f+shift);
  const minF=Math.min(...Object.values(frets).flat());
  if(minF<1){const adj=12;for(let s=1;s<=6;s++)frets[s]=frets[s].map(f=>f+adj);}
  return{...pos,frets};
}

function getInterval(openStrings,s,f,rs){
  return((openStrings[6-s]+f)%12-rs+12)%12;
}

function render(type){
  const st=state[type];
  const POSITIONS=type==='minor'?MINOR_POS:MAJOR_POS;
  const DEG=type==='minor'?MINOR_DEG:MAJOR_DEG;
  const COLOR=type==='minor'?'#4a9eff':'#4caf50';
  const tuning=TUNINGS[st.tune].s;
  const openStrings={};
  for(let s=1;s<=6;s++) openStrings[s]=((tuning[6-s]%12)+12)%12;

  const rs=rootSemi[st.root];
  const shift=(rs-9+12)%12;
  const pos=transposePos(POSITIONS[st.pos],shift,type);

  const FW=70,SS=38,LP=38,RP=16,TP=20,DR=13;
  const FRET_LBL=DR+18,MRK=DR+36,BP=MRK+14;
  const allF=Object.values(pos.frets).flat();
  const minF=Math.min(...allF),maxF=Math.max(...allF),nF=maxF-minF+1;
  const W=nF*FW+LP+RP,H=5*SS+TP+BP;
  const fx=f=>LP+(f-minF+0.5)*FW;
  const sy=s=>TP+(s-1)*SS;
  const lastStrY=sy(6);

  // String labels from tuning
  const strNames={};
  for(let s=1;s<=6;s++){
    const n=NOTES_F[((tuning[6-s]%12)+12)%12];
    strNames[s]=s===6?n.toLowerCase():n;
  }

  let sv=`<svg viewBox="0 0 ${W} ${H}" style="display:block;width:100%;max-width:${W}px">`;
  for(let i=0;i<=nF;i++){
    const x=LP+i*FW,clr=i===0?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.08)';
    sv+=`<line x1="${x}" y1="${TP}" x2="${x}" y2="${lastStrY+DR+2}" stroke="${clr}" stroke-width="${i===0?3:1}"/>`;
  }
  for(let s=1;s<=6;s++){
    const y=sy(s),sw=s===6?2.5:s===5?2:s===4?1.6:s===3?1.2:s===2?0.9:0.7;
    sv+=`<line x1="${LP}" y1="${y}" x2="${LP+nF*FW}" y2="${y}" stroke="rgba(255,255,255,0.35)" stroke-width="${sw}"/>`;
    sv+=`<text x="${LP-11}" y="${y+5}" font-size="13" font-weight="700" fill="#fff" text-anchor="middle" font-family="sans-serif">${strNames[s]}</text>`;
  }
  for(let f=minF;f<=maxF;f++){
    const x=fx(f),isMark=[3,5,7,9,12,15,17].includes(f);
    sv+=`<text x="${x}" y="${lastStrY+FRET_LBL}" font-size="13" font-weight="${isMark?'700':'400'}" fill="${isMark?'#fff':'#888'}" text-anchor="middle" font-family="sans-serif">${f}</text>`;
    if(isMark){const mx=f===12?[x-7,x+7]:[x];mx.forEach(cx=>sv+=`<circle cx="${cx}" cy="${lastStrY+MRK}" r="3.5" fill="rgba(255,255,255,0.2)"/>`);}
  }
  for(let s=1;s<=6;s++){
    for(const f of pos.frets[s]){
      const interval=getInterval(openStrings,s,f,rs),isR=interval===0;
      const x=fx(f),y=sy(s),fill=isR?COLOR:'#555',lbl=DEG[interval]||'?';
      sv+=`<circle cx="${x}" cy="${y}" r="${DR}" fill="${fill}"/>`;
      sv+=`<text x="${x}" y="${y+4}" font-size="${lbl.length>1?9:11}" fill="#fff" text-anchor="middle" font-family="sans-serif" font-weight="600">${lbl}</text>`;
    }
  }
  sv+=`</svg>`;

  document.getElementById(`${type}-fb`).innerHTML=sv;
  document.getElementById(`${type}-info`).textContent=pos.info;
  document.querySelectorAll(`#${type}-root .pb`).forEach(b=>b.classList.toggle('on',b.dataset.v===st.root));
  document.querySelectorAll(`#${type}-tune .pb`).forEach(b=>{b.classList.toggle('on',+b.dataset.v===st.tune);b.style.background=+b.dataset.v===st.tune?'#3a3a3a':'';b.style.borderColor=+b.dataset.v===st.tune?'#ccc':'';});
  document.querySelectorAll(`#${type}-pos .pb`).forEach(b=>b.classList.toggle('on',+b.dataset.v===st.pos));
}

function buildControls(type){
  const COLOR=type==='minor'?'#4a9eff':'#4caf50';
  const POSITIONS=type==='minor'?MINOR_POS:MAJOR_POS;
  const st=state[type];

  // Root buttons
  const rEl=document.getElementById(`${type}-root`);
  rEl.innerHTML=`<div class="psec">TÓNICA</div><div class="prow">${rootNames.map(r=>`<button class="pb" data-v="${r}">${r}</button>`).join('')}</div>`;
  rEl.querySelectorAll('.pb').forEach(b=>b.addEventListener('click',()=>{st.root=b.dataset.v;render(type);}));

  // Tuning buttons
  const tEl=document.getElementById(`${type}-tune`);
  tEl.innerHTML=`<div class="psec">AFINACIÓN</div><div class="prow">${TUNINGS.map((t,i)=>`<button class="pb" data-v="${i}">${t.name}</button>`).join('')}</div>`;
  tEl.querySelectorAll('.pb').forEach(b=>b.addEventListener('click',()=>{st.tune=+b.dataset.v;render(type);}));

  // Position buttons
  const pEl=document.getElementById(`${type}-pos`);
  pEl.innerHTML=`<div class="psec">POSICIÓN</div><div class="prow">${POSITIONS.map((p,i)=>`<button class="pb" data-v="${i}" style="background:${i===st.pos?COLOR:'transparent'};color:${i===st.pos?'#fff':'#ccc'};border-color:${i===st.pos?'transparent':'#444'}">Pos. ${p.l}</button>`).join('')}</div>`;
  pEl.querySelectorAll('.pb').forEach(b=>b.addEventListener('click',()=>{
    st.pos=+b.dataset.v;
    pEl.querySelectorAll('.pb').forEach(btn=>{btn.style.background=+btn.dataset.v===st.pos?COLOR:'transparent';btn.style.color=+btn.dataset.v===st.pos?'#fff':'#ccc';btn.style.borderColor=+btn.dataset.v===st.pos?'transparent':'#444';});
    render(type);
  }));
}

// Init
['minor','major'].forEach(type=>{buildControls(type);render(type);});

// Override .on style for root/tune
const style=document.createElement('style');
style.textContent=`
#minor-root .pb.on,#minor-pos .pb.on{background:#4a9eff!important;color:#fff!important;border-color:transparent!important}
#major-root .pb.on,#major-pos .pb.on{background:#4caf50!important;color:#fff!important;border-color:transparent!important}
`;
document.head.appendChild(style);
</script>
</body>
</html>
